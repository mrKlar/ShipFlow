id: api-get-todos
title: GET /api/todos?filter=active returns only active todos
severity: blocker
state:
  kind: sqlite
  connection: ./test.db
  reset_sql: |-
    CREATE TABLE IF NOT EXISTS todos (
      id INTEGER PRIMARY KEY,
      title TEXT NOT NULL,
      completed INTEGER NOT NULL DEFAULT 0
    );
    DELETE FROM todos;
    INSERT INTO todos (id, title, completed) VALUES (1, 'Task one', 1);
    INSERT INTO todos (id, title, completed) VALUES (2, 'Task two', 0);
app:
  kind: api
  base_url: http://localhost:3000
request:
  method: GET
  path: /api/todos?filter=active
assert:
  - status: 200
  - header_matches:
      name: content-type
      matches: json
  - json_type:
      path: $
      type: array
  - json_count:
      path: $
      count: 1
  - json_array_includes:
      path: $
      equals:
        title: Task two
        completed: false
  - json_schema:
      path: $
      schema:
        type: array
        items:
          type: object
          required:
            - id
            - title
            - completed
          properties:
            id:
              type: number
            title:
              type: string
            completed:
              type: boolean
