id: db-todos-sqlite-lifecycle
title: SQLite todos data lifecycle stays observable
severity: blocker
app:
  kind: db
  engine: sqlite
  connection: ./test.db
before_query: PRAGMA table_info(todos);
before_assert:
  - row_count_gte: 3
  - column_contains:
      column: name
      value: id
  - column_contains:
      column: name
      value: title
  - column_contains:
      column: name
      value: completed
setup_sql: |-
  CREATE TABLE IF NOT EXISTS todos (
    id INTEGER PRIMARY KEY,
    title TEXT NOT NULL,
    completed INTEGER NOT NULL DEFAULT 0
  );
  DELETE FROM todos;
  INSERT INTO todos (id, title, completed) VALUES (1, 'Draft task', 0);
action_sql: INSERT INTO todos (id, title, completed) VALUES (2, 'Follow-up task', 1);
query: SELECT id, title, completed FROM todos ORDER BY id;
assert:
  - row_count: 2
  - cell_equals:
      row: 0
      column: title
      equals: Draft task
  - cell_equals:
      row: 1
      column: completed
      equals: '1'
cleanup_sql: DELETE FROM todos;
