id: filter-todos
title: User can filter todos by status
severity: blocker
state:
  kind: sqlite
  connection: ./test.db
  reset_sql: |-
    CREATE TABLE IF NOT EXISTS todos (
      id INTEGER PRIMARY KEY,
      title TEXT NOT NULL,
      completed INTEGER NOT NULL DEFAULT 0
    );
    DELETE FROM todos;
    INSERT INTO todos (id, title, completed) VALUES (1, 'Task one', 1);
    INSERT INTO todos (id, title, completed) VALUES (2, 'Task two', 0);
app:
  kind: web
  base_url: http://localhost:3000
flow:
  - open: /
  - select:
      label: Filter
      value: active
assert:
  - count:
      testid: todo-item
      equals: 1
  - text_equals:
      testid: todo-item-0
      equals: Task two
  - hidden:
      testid: no-todos-message
  - url_matches:
      regex: filter=active
