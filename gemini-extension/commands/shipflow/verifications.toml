description = "Collaboratively draft or refine a ShipFlow verification pack"

prompt = """
# ShipFlow — Verification Collaboration

Use this command when the user wants to define, review, add, remove, or tighten ShipFlow verifications.

This phase is human + AI collaboration, not an autonomous one-shot.

## Context

{{args}}

## Workflow

1. If the project has no `shipflow.json`, run:

```bash
shipflow init
```

2. Build context before writing:
- review existing `vp/` files
- run `shipflow map --json "{{args}}"` when repo context matters
- run `shipflow draft --json "{{args}}"` when starter proposals would help

3. Draft or refine the verification pack in `vp/`:
- prefer one observable behavior per file
- cover the relevant types: UI, behavior, API, database, performance, security, technical
- surface ambiguities instead of hiding them
- use `shipflow draft --write "{{args}}"` only when starter files are actually useful

4. Validate every pass:

```bash
shipflow lint
shipflow gen
```

5. Present a short summary:
- what was added or changed
- what is still ambiguous
- what is intentionally not covered yet

6. When the user is satisfied, continue with:

```text
/shipflow:implement
```
"""
